<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Favicon (start) -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <link
      rel="shortcut icon"
      href="/favicon.ico"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />
    <meta
      name="apple-mobile-web-app-title"
      content="Audiophile"
    />
    <link
      rel="manifest"
      href="/site.webmanifest"
    />
    <!-- Favicon (end) -->

    <!-- SEO (start) -->
    <meta
      name="title"
      content="Audiophile"
    />
    <meta
      name="description"
      content="Audiophile - Premium headphones, speakers and earphones."
    />
    <meta
      name="robots"
      content="index, follow"
    />
    <meta
      name="author"
      content="Alberto José"
    />
    <link
      rel="canonical"
      href="https://audiophile-domain.com"
    />
    <!-- SEO (end) -->

    <!-- Open Graph (start) -->
    <meta
      property="og:type"
      content="website"
    />
    <meta
      property="og:site_name"
      content="Audiophile"
    />
    <meta
      property="og:title"
      content="Audiophile - Premium Audio Equipment"
    />
    <meta
      property="og:description"
      content="Premium headphones, speakers and earphones."
    />
    <meta
      property="og:image"
      content="/og-image.png"
    />
    <!-- Open Graph (end) -->

    <!-- Twitter/X Card (start) -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />
    <meta
      name="twitter:title"
      content="Audiophile - Premium Audio Equipment"
    />
    <meta
      name="twitter:description"
      content="Premium headphones, speakers and earphones."
    />
    <meta
      name="twitter:image"
      content="/og-image.png"
    />
    <!-- Twitter/X Card (start) -->

    <title>Audiophile</title>
  </head>
  <body>
    <div id="root"></div>
    <script
      type="module"
      src="/src/main.tsx"
